name: 每日台股開盤前分析

on:
  schedule:
    - cron: '30 0 * * 1-5'  # 台灣時間 08:30（UTC 00:30），週一到週五
  workflow_dispatch:          # 手動觸發用

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install requests pytz yfinance

      - name: 執行分析
        run: |
          echo "=== analyze.py 版本確認 ==="
          head -5 analyze.py
          echo "=== 已安裝套件 ==="
          pip list | grep -E "anthropic|requests|pytz"
          echo "=== 開始執行 ==="
          python analyze.py

      - name: Commit 並推送
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add observation.md
          git diff --staged --quiet || git commit -m "每日分析 $(TZ=Asia/Taipei date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push

      - name: ntfy 推播通知
        if: ${{ secrets.NTFY_TOPIC != '' }}
        run: |
          SUMMARY=$(cat summary.txt 2>/dev/null || echo "分析完成，請查看 observation.md")
          curl -s \
            -H "Title: 台股開盤前分析 $(TZ=Asia/Taipei date '+%m/%d')" \
            -H "Priority: default" \
            -H "Tags: chart_with_upwards_trend" \
            -d "$SUMMARY" \
            https://ntfy.sh/${{ secrets.NTFY_TOPIC }} || echo "ntfy 推播失敗，繼續執行"
